<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{title}}</title>
  <style>
    body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
      font-family:'Segoe UI',Arial,sans-serif; background:#f5ebfa; padding:24px; }
    .card { max-width:420px; width:100%; background:#fff; border-radius:16px; padding:40px 28px;
      text-align:center; box-shadow:0 4px 24px rgba(73, 34, 91, 0.1); }
    .icon { font-size:48px; margin-bottom:16px; }
    h1 { margin:0 0 12px; color:#1f2937; font-size:22px; }
    p { margin:0 0 24px; color:#6b7280; line-height:1.6; font-size:16px; }
    .success { color:#16a34a; }
    .error { color:#dc2626; }
    .btn { display:inline-flex; align-items:center; justify-content:center; min-height:48px;
      width:100%; padding:12px 16px; border-radius:10px; background:#49225b; color:#fff;
      text-decoration:none; font-weight:600; font-size:16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">{{icon}}</div>
    <h1 class="{{titleClass}}">{{title}}</h1>
    <p>{{message}}</p>
    <a class="btn" href="{{loginUrl}}">Continue to sign in</a>
  </div>
</body>
</html>
