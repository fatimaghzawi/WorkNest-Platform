<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{title}}</title>
  <style>
    body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
      font-family:'Segoe UI',Arial,sans-serif; background:#f0f4f8; padding:24px; }
    .card { max-width:420px; width:100%; background:#fff; border-radius:12px; padding:40px 32px;
      text-align:center; box-shadow:0 4px 24px rgba(15,23,42,0.08); }
    .icon { font-size:48px; margin-bottom:16px; }
    h1 { margin:0 0 12px; color:#0f172a; font-size:22px; }
    p { margin:0; color:#475569; line-height:1.6; font-size:16px; }
    .success { color:#16a34a; }
    .error { color:#dc2626; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">{{icon}}</div>
    <h1 class="{{titleClass}}">{{title}}</h1>
    <p>{{message}}</p>
  </div>
</body>
</html>
