<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{title}}</title>
</head>
<body style="margin:0;padding:0;background-color:#f0f4f8;font-family:'Segoe UI',Arial,Helvetica,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f0f4f8;padding:40px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(15,23,42,0.08);">
          <tr>
            <td style="background:linear-gradient(135deg,#49225B 0%,#6b3a7d 100%);padding:32px;text-align:center;">
              <div style="display:inline-block;background:#ffffff;border-radius:12px;padding:12px 20px;margin-bottom:12px;">
                <img src="{{logoUrl}}" alt="{{appName}}" width="120" style="display:block;max-width:120px;height:auto;" />
              </div>
              <h1 style="margin:0;color:#ffffff;font-size:22px;font-weight:700;">{{title}}</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:36px 32px;">
              <h2 style="margin:0 0 16px;color:#0f172a;font-size:18px;font-weight:700;">Hi {{firstName}},</h2>
              <p style="margin:0 0 28px;color:#475569;font-size:16px;line-height:1.7;">{{message}}</p>
              {{actionButtonHtml}}
            </td>
          </tr>
          <tr>
            <td style="padding:20px 32px;background:#f8fafc;border-top:1px solid #e2e8f0;text-align:center;">
              <p style="margin:0 0 4px;color:#94a3b8;font-size:12px;">You received this email because of activity on your {{appName}} account.</p>
              <p style="margin:0;color:#cbd5e1;font-size:11px;">&copy; {{year}} {{appName}}. All rights reserved.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
